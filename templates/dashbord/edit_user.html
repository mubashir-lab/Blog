{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}
<div class="row">
    <!-- Left sidebar -->
    <!--load sidebar here -->
    {% include "dashbord/sidebar.html" %}


    <!-- Right side content -->
    <div class="col-md-9">
        {% if perms.auth.view_user %}
        <h2>Edit User</h2>
        <form action="" method="POST" style="width: 500px;">
            {% csrf_token %}
            {{form | crispy }}
            <button type="submit" class="btn btn-warning">Submit</button>
        </form>
        {% else %}
        <h4>You dont have permission</h4>
        {% endif %}
    </div>
</div>
{% endblock %}
